name: AlgoZen CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Checks ──────────────────────────────────
  backend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./algozen/server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: algozen/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: node --check src/index.js

  # ─── Frontend Checks ─────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./algozen/client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: algozen/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
